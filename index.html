<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidera Site</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background-color: #4CAF50; color: white; padding: 20px; text-align: center; }
        .services { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; }
        .service { border: 1px solid #eaeaea; padding: 20px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Lidera</h1>
        <p>Your partner in excellence</p>
    </header>
    <main>
        <section>
            <h2>Our Services</h2>
            <div class="services">
                <div class="service">Business Management</div>
                <div class="service">Program Management Office</div>
                <div class="service">Program Management</div>
                <div class="service">Design Auditing</div>
                <div class="service">Team Development</div>
                <div class="service">Manager Coaching</div>
                <div class="service">Supply Chain Support</div>
                <div class="service">Product Design Support</div>
            </div>
        </section>
    </main>
</body>
</html>
